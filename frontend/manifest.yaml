apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    project: roboshop
    tier: frontend
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      component: frontend
  template:
    metadata:
        labels:
          project: roboshop
          tier: frontend
          component: frontend
    spec:
      containers:
        - name: frontend
          image: joindevops/frontend:4.0.0
---
apiVersion: v1
kind: service
metadata:
  labels:
    project: roboshop
    tier: frontend
    component: frontend
spec:
  type: NodePort
  selector:
    project: roboshop
    tier: frontend
    component: frontend
  ports:
    - protocol: TCP
      targetPort: 80
      port: 8080
      nodePort: 30007
      

